name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Model tests ─────────────────────────────────────────────────────────────
  model-tests:
    name: Python model tests (186)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-model-${{ hashFiles('requirements.txt') }}

      - name: Install model dependencies
        run: pip install -r requirements.txt

      - name: Keep the scored-data cache fresh
        # actions/checkout materializes every file at roughly the same time,
        # in whatever order git happens to write blobs — not the original
        # authoring order. peak3.py's own cache-invalidation logic (comparing
        # mtimes) treats cache/processed/scored_1980_2026.parquet as stale if
        # data/generated/player_season_context.parquet looks newer, which can
        # happen purely from checkout ordering and would trigger an
        # unintended (and here, network-less) rebuild attempt mid-test-run.
        # Touching it last guarantees it is never considered stale.
        run: touch cache/processed/scored_1980_2026.parquet

      - name: Run model tests
        run: python -m pytest tests/ -v --tb=short --ignore=tests/lineup

  # ── Lineup model tests ───────────────────────────────────────────────────────
  lineup-tests:
    name: Experimental lineup model tests (41)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lineup-${{ hashFiles('requirements.txt') }}

      - name: Install model dependencies
        run: pip install -r requirements.txt

      - name: Run lineup model tests (need v3 profiles)
        run: |
          pip install pandas unidecode
          python scripts/build_web_dataset.py
          python scripts/build_card_profiles.py
          python -m pytest tests/lineup/ -v --tb=short

  # ── Data build + card profiles ───────────────────────────────────────────────
  web-dataset:
    name: Build web dataset + card profiles v3
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pandas unidecode

      - name: Build web dataset
        run: python scripts/build_web_dataset.py

      - name: Build card profiles v3 (Peak Draft game data)
        run: python scripts/build_card_profiles.py

      - name: Verify v3 artifacts exist
        run: |
          test -f data/game/profiles/card_profiles.v3.json   || (echo "MISSING card_profiles.v3.json"   && exit 1)
          test -f data/game/profiles/profile_metadata.v3.json || (echo "MISSING profile_metadata.v3.json" && exit 1)

      - name: Upload dataset artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dataset
          path: data/web/

      - name: Upload game-data artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-data
          path: data/game/

  # ── Board generation smoke check ─────────────────────────────────────────────
  board-generation:
    name: Board generation smoke check (225 seeds × 3 modes)
    runs-on: ubuntu-latest
    needs: web-dataset
    steps:
      - uses: actions/checkout@v4

      - name: Download dataset
        uses: actions/download-artifact@v4
        with:
          name: web-dataset
          path: data/web/

      - name: Download game data
        uses: actions/download-artifact@v4
        with:
          name: game-data
          path: data/game/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install model dependencies
        run: pip install -r requirements.txt

      - name: Smoke check 225 boards (75 seeds × 3 modes)
        run: python scripts/check_board_generation.py 75

  # ── FastAPI tests ────────────────────────────────────────────────────────────
  api-tests:
    name: FastAPI tests (264, 0 skipped)
    runs-on: ubuntu-latest
    needs: web-dataset
    steps:
      - uses: actions/checkout@v4

      - name: Download dataset
        uses: actions/download-artifact@v4
        with:
          name: web-dataset
          path: data/web/

      - name: Download game data
        uses: actions/download-artifact@v4
        with:
          name: game-data
          path: data/game/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-api-${{ hashFiles('apps/api/requirements.txt') }}

      - name: Install model + API dependencies
        run: |
          pip install -r requirements.txt
          pip install -r apps/api/requirements.txt

      - name: Run API tests (must have 0 skipped)
        # tests/integration/ is excluded here, and any test marked
        # supabase_integration (including test_repository_conformance.py's
        # real-Postgres half) is deselected rather than run-and-skipped —
        # both always skip without real Supabase test-project secrets (see
        # the dedicated supabase-integration job below), which would
        # otherwise violate this job's own "0 skipped" guarantee.
        run: python -m pytest tests/ -v --tb=short --ignore=tests/integration -m "not supabase_integration"
        working-directory: apps/api

  # ── Frontend unit tests + build ───────────────────────────────────────────────
  frontend:
    name: Frontend (typecheck, lint, unit tests, production build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        working-directory: apps/web

      - name: Type check
        run: npm run typecheck
        working-directory: apps/web

      - name: Lint (zero warnings)
        run: npm run lint -- --max-warnings 0
        working-directory: apps/web

      - name: Unit tests (vitest, 87)
        run: npm run test
        working-directory: apps/web

      - name: Production build
        # Always build from clean state — never reuse .next cache in CI
        run: |
          rm -rf .next
          npm run build
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  # ── Playwright e2e + accessibility ───────────────────────────────────────────
  playwright:
    name: Playwright browser tests + axe accessibility (62, 0 retries)
    runs-on: ubuntu-latest
    needs: [web-dataset, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Download dataset
        uses: actions/download-artifact@v4
        with:
          name: web-dataset
          path: data/web/

      - name: Download game data
        uses: actions/download-artifact@v4
        with:
          name: game-data
          path: data/game/

      # Python + FastAPI
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip (API + model)
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-pw-${{ hashFiles('requirements.txt', 'apps/api/requirements.txt') }}

      - name: Install model + API dependencies
        run: |
          pip install -r requirements.txt
          pip install -r apps/api/requirements.txt

      # Node + Next.js + Playwright
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        run: npm install --legacy-peer-deps
        working-directory: apps/web

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/web

      - name: Confirm no stale processes on ports 3000/8000
        run: |
          lsof -ti :3000 && echo "PORT 3000 OCCUPIED — aborting" && exit 1 || true
          lsof -ti :8000 && echo "PORT 8000 OCCUPIED — aborting" && exit 1 || true

      # CI=true forces reuseExistingServer=false so Playwright always starts
      # its own services from the current working tree. PLAYWRIGHT_RETRIES=0
      # ensures zero retries for the release-gate proof run.
      - name: Run Playwright tests (fresh services, 0 retries)
        run: npm run test:e2e:ci
        working-directory: apps/web
        env:
          CI: true
          PLAYWRIGHT_RETRIES: "0"
          NEXT_PUBLIC_API_URL: http://localhost:8000

      - name: Upload Playwright report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

      - name: Upload Playwright traces on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: apps/web/test-results/
          retention-days: 7

  # ── Supabase integration tests (Phase 4.0 — ranked release gate) ────────────
  #
  # Requires a real, isolated Supabase test project. Never runs against a
  # shared/production project. This job always runs (never a job-level
  # `if:` skip) so a missing-secrets state is always visibly reported in
  # the job log and summary as "not configured" — it must never look like
  # a silent skip that could be mistaken for a pass. Required as a status
  # check specifically for promoting a build to ranked closed alpha (see
  # docs/architecture/ADR-004-phase4-ranked.md section A and
  # docs/implementation/PHASE_4_0_REPORT.md); it is intentionally NOT
  # required for ordinary merges to main, since most contributors will not
  # have test-project secrets.
  supabase-integration:
    name: Supabase integration tests (ranked release gate)
    runs-on: ubuntu-latest
    needs: web-dataset
    steps:
      - uses: actions/checkout@v4

      - name: Check required secrets
        id: check
        run: |
          if [ -z "${{ secrets.PEAK3_TEST_SUPABASE_URL }}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "## :warning: Supabase integration tests: NOT CONFIGURED" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "PEAK3_TEST_SUPABASE_URL (and related test-project secrets) are not set in this repository/environment." >> "$GITHUB_STEP_SUMMARY"
            echo "This is expected for ordinary PRs. It IS required, with secrets present, before promoting a build to ranked closed alpha." >> "$GITHUB_STEP_SUMMARY"
            echo "::warning::Supabase integration tests skipped — not configured. Required (with secrets) for ranked release promotion, not for ordinary merges."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.check.outputs.configured == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install model + API dependencies
        if: steps.check.outputs.configured == 'true'
        run: |
          pip install -r requirements.txt
          pip install -r apps/api/requirements.txt

      - name: Run Supabase integration tests
        if: steps.check.outputs.configured == 'true'
        # test_repository_conformance.py's Postgres-half tests carry the same
        # supabase_integration marker as tests/integration/ (see that file's
        # module docstring) so they run for real here too, instead of being
        # permanently deselected everywhere.
        run: python -m pytest tests/integration/ tests/test_repository_conformance.py -m supabase_integration -v --tb=short
        working-directory: apps/api
        env:
          PEAK3_TEST_SUPABASE_URL: ${{ secrets.PEAK3_TEST_SUPABASE_URL }}
          PEAK3_TEST_SUPABASE_ANON_KEY: ${{ secrets.PEAK3_TEST_SUPABASE_ANON_KEY }}
          PEAK3_TEST_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.PEAK3_TEST_SUPABASE_SERVICE_ROLE_KEY }}
          PEAK3_TEST_DATABASE_URL: ${{ secrets.PEAK3_TEST_DATABASE_URL }}
          PEAK3_TEST_SUPABASE_JWT_SECRET: ${{ secrets.PEAK3_TEST_SUPABASE_JWT_SECRET }}

      - name: Report final status
        if: always()
        run: |
          if [ "${{ steps.check.outputs.configured }}" != "true" ]; then
            echo "RESULT: not configured (expected outside ranked-release-promotion runs)"
          else
            echo "RESULT: ran against a real Supabase test project"
          fi
