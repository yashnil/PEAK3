name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Model tests ─────────────────────────────────────────────────────────────
  model-tests:
    name: Python model tests (186)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-model-${{ hashFiles('requirements.txt') }}

      - name: Install model dependencies
        run: pip install -r requirements.txt

      - name: Run model tests
        run: python -m pytest tests/ -v --tb=short --ignore=tests/lineup

  # ── Lineup model tests ───────────────────────────────────────────────────────
  lineup-tests:
    name: Experimental lineup model tests (41)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lineup-${{ hashFiles('requirements.txt') }}

      - name: Install model dependencies
        run: pip install -r requirements.txt

      - name: Run lineup model tests (need v2 profiles)
        run: |
          pip install pandas unidecode
          python scripts/build_web_dataset.py
          python scripts/build_card_profiles.py
          python -m pytest tests/lineup/ -v --tb=short

  # ── Data build + card profiles ───────────────────────────────────────────────
  web-dataset:
    name: Build web dataset + card profiles v2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pandas unidecode

      - name: Build web dataset
        run: python scripts/build_web_dataset.py

      - name: Build card profiles v2 (Peak Draft game data)
        run: python scripts/build_card_profiles.py

      - name: Verify v2 artifacts exist
        run: |
          test -f data/game/profiles/card_profiles.v2.json   || (echo "MISSING card_profiles.v2.json"   && exit 1)
          test -f data/game/profiles/profile_metadata.v2.json || (echo "MISSING profile_metadata.v2.json" && exit 1)

      - name: Upload dataset artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dataset
          path: data/web/

      - name: Upload game-data artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-data
          path: data/game/

  # ── Board generation smoke check ─────────────────────────────────────────────
  board-generation:
    name: Board generation smoke check (75 seeds × 3 modes)
    runs-on: ubuntu-latest
    needs: web-dataset
    steps:
      - uses: actions/checkout@v4

      - name: Download dataset
        uses: actions/download-artifact@v4
        with:
          name: web-dataset
          path: data/web/

      - name: Download game data
        uses: actions/download-artifact@v4
        with:
          name: game-data
          path: data/game/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install model dependencies
        run: pip install -r requirements.txt

      - name: Smoke check 225 boards (75 seeds × 3 modes)
        run: python scripts/check_board_generation.py 75

  # ── FastAPI tests ────────────────────────────────────────────────────────────
  api-tests:
    name: FastAPI tests (92, 0 skipped)
    runs-on: ubuntu-latest
    needs: web-dataset
    steps:
      - uses: actions/checkout@v4

      - name: Download dataset
        uses: actions/download-artifact@v4
        with:
          name: web-dataset
          path: data/web/

      - name: Download game data
        uses: actions/download-artifact@v4
        with:
          name: game-data
          path: data/game/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-api-${{ hashFiles('apps/api/requirements.txt') }}

      - name: Install API dependencies
        run: pip install -r apps/api/requirements.txt
        working-directory: apps/api

      - name: Run API tests (must have 0 skipped)
        run: python -m pytest tests/ -v --tb=short
        working-directory: apps/api

  # ── Frontend unit tests + build ───────────────────────────────────────────────
  frontend:
    name: Frontend (typecheck, unit tests, production build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        working-directory: apps/web

      - name: Type check
        run: npm run typecheck
        working-directory: apps/web

      - name: Unit tests (vitest)
        run: npm run test
        working-directory: apps/web

      - name: Production build
        run: npm run build
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  # ── Playwright e2e + accessibility ───────────────────────────────────────────
  playwright:
    name: Playwright browser tests + axe accessibility
    runs-on: ubuntu-latest
    needs: [web-dataset, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Download dataset
        uses: actions/download-artifact@v4
        with:
          name: web-dataset
          path: data/web/

      - name: Download game data
        uses: actions/download-artifact@v4
        with:
          name: game-data
          path: data/game/

      # Python + FastAPI
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip (API + model)
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-pw-${{ hashFiles('requirements.txt', 'apps/api/requirements.txt') }}

      - name: Install model + API dependencies
        run: |
          pip install -r requirements.txt
          pip install -r apps/api/requirements.txt

      # Node + Next.js + Playwright
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        run: npm install --legacy-peer-deps
        working-directory: apps/web

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/web

      - name: Run Playwright tests (services auto-start via webServer config)
        run: npm run test:e2e
        working-directory: apps/web
        env:
          CI: true
          NEXT_PUBLIC_API_URL: http://localhost:8000

      - name: Upload Playwright report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

      - name: Upload Playwright traces on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: apps/web/test-results/
          retention-days: 7
